<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- SEO BASICO -->
    <title>GV SANITARIOS</title>
    <meta name="description" content="GV Sanitarios - Todo en sanitarios, griferías y soluciones para tu hogar. Asesoramiento personalizado.">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS propio -->
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

<!-- ================= HERO ================= -->
<section class="hero d-flex justify-content-center">

    <div class="hero-container text-center">

        <img src="img/logo.png" class="logo mb-3" alt="GV Sanitarios Logo">

        <h1 class="fw-bold">GV SANITARIOS</h1>

        <p class="subtitle">
            Todo lo que necesitás en sanitarios
        </p>

        <!-- BOTONES -->
        <div class="botones mt-4">

            <a id="btnWhatsapp" class="btn btn-gv">
                Consultar por WhatsApp
            </a>

            <button class="btn btn-gv-outline"
                data-bs-toggle="modal"
                data-bs-target="#horarioModal">
                Ver horarios
            </button>

            <a class="btn btn-gv-outline">
                Ver productos
            </a>

            <a class="btn btn-gv-outline">
                Cómo llegar
            </a>

        </div>

    </div>

</section>

<!-- ================= MODAL HORARIOS ================= -->
<div class="modal fade" id="horarioModal">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content text-center p-4">

      <h4 class="mb-3">Horarios de Atención</h4>

      <p>
        Lunes a Sábado<br>
        08:00 a 18:00 hs
      </p>

      <button class="btn btn-dark mt-2" data-bs-dismiss="modal">
        Cerrar
      </button>

    </div>
  </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- JS propio -->
<script src="js/app.js"></script>

</body>
</html>
